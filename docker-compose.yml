version: "3.8"
services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotels_db}
      MYSQL_USER: ${MYSQL_USER:-hotels}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hotels}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  web:
    build: .
    command: bash -c "python manage.py migrate && gunicorn hotels_api.infrastructure.config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotels_db}
      MYSQL_USER: ${MYSQL_USER:-hotels}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hotels}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  db_data:
